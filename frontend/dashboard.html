<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard | GuideMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50">
    <div class="max-w-5xl mx-auto py-12 px-6">
        <h1 class="text-4xl font-bold mb-10">User Dashboard</h1>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-3xl border shadow-sm">
                <h3 class="text-2xl font-bold mb-2 text-blue-600">Guided Path</h3>
                <p class="text-slate-500 mb-6">The AI will read your resume and generate questions based on your
                    specific skills.</p>
                <a href="/resume-upload"
                    class="inline-block bg-blue-600 text-white px-6 py-3 rounded-xl font-bold">Start Now</a>
            </div>
            <div class="bg-white p-8 rounded-3xl border shadow-sm opacity-60">
                <h3 class="text-2xl font-bold mb-2">Manual Path</h3>
                <p class="text-slate-500 mb-6">Enter your skills manually if you don't have a resume ready.</p>
                <button class="bg-slate-200 text-slate-500 px-6 py-3 rounded-xl font-bold cursor-not-allowed">Coming
                    Soon</button>
            </div>
        </div>
    </div>
</body>

</html>
