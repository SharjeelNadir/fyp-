<!-- frontend/quiz.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Technical Quiz | GuideMe</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-3xl mx-auto bg-white p-10 rounded-3xl shadow-xl mt-10">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">
                Step 3: Technical Assessment
            </h2>
            <span id="progress" class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-bold">
                Initializing...
            </span>
        </div>

        <!-- Loader -->
        <div id="quiz-loader" class="text-center py-20">
            <div
                class="animate-spin inline-block w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mb-4">
            </div>
            <p class="text-slate-500 font-medium">
                Generating questions based on your skills...
            </p>
        </div>

        <!-- Quiz Content -->
        <div id="quiz-content" class="hidden">
            <div id="skill-tag" class="text-xs font-bold uppercase tracking-widest text-blue-500 mb-2">
            </div>

            <h3 id="question-text" class="text-xl font-bold text-slate-900 mb-8 leading-relaxed">
            </h3>

            <div id="options-container" class="space-y-4"></div>

            <button id="next-btn"
                class="mt-10 w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition"
                onclick="handleNext()">
                Next Question
            </button>
        </div>

        <!-- Sub Loader -->
        <div id="sub-loader" class="hidden text-center py-10 mt-4 bg-slate-50 rounded-xl border border-dashed">
            <div
                class="animate-spin inline-block w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full mr-2 align-middle">
            </div>
            <span class="text-slate-500 text-sm italic">
                Preparing next question...
            </span>
        </div>
    </div>

    <script>
        let currentIdx = 0;
        let totalScore = 0;
        let questions = [];
        let selectedAnswer = null;

        // Skill-wise scoring
        let skillScores = {};
        // { "Python": { correct: 0, total: 0 }, ... }

        const skills = JSON.parse(localStorage.getItem("userSkills")) || [];

        // ---------------- INIT ----------------
        async function initQuiz() {
            if (skills.length === 0) {
                window.location.href = "/dashboard";
                return;
            }

            fetchAllQuestions();
            await waitForQuestion(0);

            document.getElementById("quiz-loader").classList.add("hidden");
            document.getElementById("quiz-content").classList.remove("hidden");
            renderQuestion();
        }

        // ---------------- FETCH QUESTIONS ----------------
        async function fetchAllQuestions() {
            let index = 0;

            for (let skill of skills) {
                try {
                    const res = await fetch(`/api/generate_mcqs?skill=${skill}`);
                    const data = await res.json();

                    data.forEach(q => {
                        questions[index++] = q;
                    });

                    console.log(`✅ Loaded 3 questions for ${skill}`);
                } catch (err) {
                    console.error("Error fetching questions", err);
                }
            }
        }

        async function waitForQuestion(i) {
            while (!questions[i]) {
                await new Promise(res => setTimeout(res, 400));
            }
        }

        // ---------------- RENDER ----------------
        function renderQuestion() {
            const q = questions[currentIdx];

            document.getElementById("progress").innerText =
                `Question ${currentIdx + 1} / ${questions.length}`;

            document.getElementById("skill-tag").innerText =
                `Skill: ${q.skill}`;

            document.getElementById("question-text").innerText = q.question;

            const container = document.getElementById("options-container");
            container.innerHTML = "";

            Object.entries(q.options).forEach(([key, text]) => {
                const btn = document.createElement("button");
                btn.className =
                    "w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition font-medium text-slate-700";
                btn.innerHTML =
                    `<span class="font-bold mr-3 text-blue-600">${key}:</span>${text}`;
                btn.onclick = () => selectOption(btn, key);
                container.appendChild(btn);
            });

            selectedAnswer = null;
            document.getElementById("next-btn").disabled = false;
        }

        function selectOption(el, key) {
            Array.from(document.getElementById("options-container").children)
                .forEach(b => {
                    b.classList.remove("border-blue-500", "bg-blue-50");
                    b.classList.add("border-slate-100");
                });

            el.classList.remove("border-slate-100");
            el.classList.add("border-blue-500", "bg-blue-50");
            selectedAnswer = key;
        }

        // ---------------- NEXT ----------------
        async function handleNext() {
            if (!selectedAnswer) {
                alert("Please select an answer");
                return;
            }

            const q = questions[currentIdx];
            const skill = q.skill;

            // Init skill bucket if needed
            if (!skillScores[skill]) {
                skillScores[skill] = { correct: 0, total: 0 };
            }

            skillScores[skill].total++;

            if (selectedAnswer === q.answer) {
                totalScore++;
                skillScores[skill].correct++;
            }

            currentIdx++;

            if (currentIdx < questions.length) {
                if (!questions[currentIdx]) {
                    document.getElementById("next-btn").disabled = true;
                    document.getElementById("quiz-content").classList.add("opacity-50");
                    document.getElementById("sub-loader").classList.remove("hidden");

                    await waitForQuestion(currentIdx);

                    document.getElementById("sub-loader").classList.add("hidden");
                }
                renderQuestion();
            } else {
                // Convert skillScores → DB-friendly breakdown
                const breakdown = [];

                for (const skill in skillScores) {
                    const { correct, total } = skillScores[skill];
                    for (let i = 0; i < total; i++) {
                        breakdown.push([skill, i < correct ? 1 : 0]);
                    }
                }

                localStorage.setItem("quizScore", totalScore);
                localStorage.setItem("totalQ", questions.length);
                localStorage.setItem("skillBreakdown", JSON.stringify(breakdown));

                window.location.href = "/summary";
            }
        }

        initQuiz();
    </script>
</body>

</html>
